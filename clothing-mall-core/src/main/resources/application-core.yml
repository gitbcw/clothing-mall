litemall:
  # 开发者应该设置成自己的wx相关信息
  wx:
    app-id: wx1809b86df93c5107
    app-secret: beb22cae55435ddee2f058b4dc920345
    mch-id: 111111
    mch-key: xxxxxx
    notify-url: http://www.example.com/wx/order/pay-notify
    # 商户证书文件路径
    # 请参考“商户证书”一节 https://pay.weixin.qq.com/wiki/doc/api/wxa/wxa_api.php?chapter=4_3
    key-path: xxxxx
    # 消息推送配置token
    token:
    # 消息推送配置AesKey
    aes-key:

  #通知相关配置
  notify:
    mail:
      # 邮件通知配置,邮箱一般用于接收业务通知例如收到新的订单，sendto 定义邮件接收者，通常为商城运营人员
      enable: false
      host: smtp.exmail.qq.com
      username: ex@ex.com.cn
      password: XXXXXXXXXXXXX
      sendfrom: ex@ex.com.cn
      sendto: ex@qq.com
      port: 465
    # 短消息模版通知配置
    # 短信息用于通知客户，例如发货短信通知，注意配置格式；template-name，template-templateId 请参考 NotifyType 枚举值
    sms:
      enable: false
      # 如果是腾讯云短信，则设置active的值tencent
      # 如果是阿里云短信，则设置active的值aliyun
      active: tencent
      sign: litemall
      template:
      - name: paySucceed
        templateId: 156349
      - name: captcha
        templateId: 156433
      - name: ship
        templateId: 158002
      - name: refund
        templateId: 159447
      # 售后相关模板（复用现有模板）
      - name: aftersaleShip
        templateId: 158002  # 复用发货通知模板，参数：快递公司、快递单号
      - name: aftersaleRecept
        templateId: 158002  # 暂复用发货模板，实际需申请"审核通过"专用模板
      tencent:
        appid: 111111111
        appkey: xxxxxxxxxxxxxx
      aliyun:
        regionId: xxx
        accessKeyId: xxx
        accessKeySecret: xxx

  # 快鸟物流查询配置
  express:
    enable: ${KDN_ENABLE:false}
    appId: ${KDN_APP_ID:}
    appKey: ${KDN_APP_KEY:}
    requestType: ${KDN_REQUEST_TYPE:8002}
    callbackUrl: ${KDN_CALLBACK_URL:}
    vendors:
    - code: "ZTO"
      name: "中通快递"
    - code: "YTO"
      name: "圆通速递"
    - code: "YD"
      name: "韵达速递"
    - code: "YZPY"
      name: "邮政快递包裹"
    - code: "EMS"
      name: "EMS"
    - code: "DBL"
      name: "德邦快递"
    - code: "FAST"
      name: "快捷快递"
    - code: "ZJS"
      name: "宅急送"
    - code: "TNT"
      name: "TNT快递"
    - code: "UPS"
      name: "UPS"
    - code: "DHL"
      name: "DHL"
    - code: "FEDEX"
      name: "FEDEX联邦(国内件)"
    - code: "FEDEX_GJ"
      name: "FEDEX联邦(国际件)"

  # 对象存储配置
  storage:
    # 当前工作的对象存储模式，分别是local、aliyun、tencent、qiniu
    active: local
    # 本地对象存储配置信息
    local:
      storagePath: storage
      # 这个地方应该是wx模块的WxStorageController的fetch方法对应的地址
      address: http://localhost:8080/wx/storage/fetch/
    # 阿里云对象存储配置信息
    aliyun:
      endpoint: oss-cn-shenzhen.aliyuncs.com
      accessKeyId: 111111
      accessKeySecret: xxxxxx
      bucketName: litemall
    # 腾讯对象存储配置信息
    # 请参考 https://cloud.tencent.com/document/product/436/6249
    tencent:
      secretId: your-tencent-secret-id
      secretKey: your-tencent-secret-key
      region: ap-shanghai
      bucketName: vytech-1300096589
    # 七牛云对象存储配置信息
    qiniu:
      endpoint: http://pd5cb6ulu.bkt.clouddn.com
      accessKey: 111111
      secretKey: xxxxxx
      bucketName: litemall

  # 百度OCR文字识别配置
  # 免费额度：500次/天，约15000次/月
  # 申请地址：https://console.bce.baidu.com/ai/#/ai/ocr/app/list
  ocr:
    enabled: false
    api-key: d6adXCnmEoURuO0Lx9keO9LL
    secret-key: TplRPeZIlxaDehEXvEcEPeagMvpbfWyM

  # AI 服装识别配置（MiniMax M2.7）
  # 文档地址：https://platform.minimax.io/docs/api-reference/text-chat
  ai:
    enabled: false
    api-key: ${MINIMAX_API_KEY:}
    endpoint: https://api.minimax.io/v1/chat/completions
    model: MiniMax-Text-01
    timeout: 30000
